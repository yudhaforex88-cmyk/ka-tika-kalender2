<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ka-Tika | Kalender Bali Klasik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #120e0a;
            background-image: radial-gradient(circle at center, #2a1f18 0%, #120e0a 100%);
            color: #eaddcf;
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .text-gold { color: #d4af37; }
        .border-gold { border-color: #d4af37; }
        .bg-gold-dark { background-color: rgba(212, 175, 55, 0.1); }
        
        .card-elegant {
            background: linear-gradient(145deg, #1f1712, #140e0a);
            box-shadow:  10px 10px 30px #0a0705, -10px -10px 30px #201711;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        
        .ornament-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-md mx-auto w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-cinzel text-gold font-bold tracking-widest mb-2">KA-TIKA</h1>
            <div class="ornament-line w-3/4 mx-auto mb-2"></div>
            <p class="text-sm italic text-gray-400">Kalender Event Astronomi Bali</p>
        </div>

        <!-- Main Dashboard Card -->
        <div class="card-elegant rounded-3xl p-8 relative overflow-hidden text-center transition-all duration-500">
            <!-- Background Mandala/Pattern Hint -->
            <div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: repeating-radial-gradient(circle at center, #d4af37, #d4af37 1px, transparent 1px, transparent 10px);"></div>

            <!-- Event Status Container -->
            <div class="mb-6 inline-block px-4 py-1.5 rounded-full border border-gold bg-gold-dark text-gold text-xs font-bold tracking-widest uppercase shadow-inner transition-colors duration-300" id="event-status">
                Menghitung Fase Astronomi...
            </div>

            <!-- Hero Widget: Saptawara -->
            <div class="mb-4">
                <h2 class="text-5xl sm:text-6xl font-cinzel text-white font-bold tracking-wider uppercase drop-shadow-md" id="saptawara">
                    --
                </h2>
            </div>

            <!-- Sub Hero: Triwara & Pancawara -->
            <div class="mb-8">
                <p class="text-xl sm:text-2xl text-gold font-semibold tracking-wide" id="tri-panca">
                    -- &bull; --
                </p>
            </div>

            <div class="ornament-line w-full mb-6 opacity-50"></div>

            <!-- Bottom Data: Wuku & Sasih -->
            <div class="grid grid-cols-2 gap-4 text-center mb-4">
                <div class="flex flex-col">
                    <span class="text-xs text-gray-500 uppercase tracking-widest mb-1">Wuku</span>
                    <span class="text-lg text-white font-medium" id="wuku">--</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-xs text-gray-500 uppercase tracking-widest mb-1">Sasih</span>
                    <span class="text-lg text-white font-medium" id="sasih">--</span>
                </div>
            </div>

            <!-- Lunar Phase & Dina Label -->
            <div class="mt-4">
                <p class="text-sm text-gold tracking-wide" id="lunar-phase">--</p>
                <p class="text-xs text-gray-400 italic mt-1 hidden" id="dina-label">--</p>
            </div>
        </div>

        <!-- Gregorian Reference -->
        <div class="text-center mt-6 text-sm text-gray-400 tracking-wide font-sans" id="gregorian-date">
            --
        </div>

        <!-- Modul Pencarian Masehi -->
        <div class="mt-8 border-t border-gold/30 pt-6">
            <p class="text-xs text-gold uppercase tracking-widest mb-3 text-center">Pencarian Waktu Masehi</p>
            <div class="flex flex-col sm:flex-row gap-3 justify-center items-center">
                <input type="datetime-local" id="search-input" class="bg-[#1a140f] border border-gold/50 text-[#eaddcf] px-4 py-2 rounded-md outline-none focus:border-gold w-full sm:w-auto text-sm font-sans color-scheme-dark" style="color-scheme: dark;">
                <div class="flex gap-2 w-full sm:w-auto">
                    <button id="btn-search" class="bg-gold-dark border border-gold text-gold px-4 py-2 rounded-md hover:bg-[#d4af37] hover:text-black transition-all text-sm font-bold tracking-wide w-full sm:w-auto">Cari</button>
                    <button id="btn-reset" class="bg-transparent border border-gray-600 text-gray-400 px-4 py-2 rounded-md hover:border-gray-400 hover:text-white transition-all text-sm w-full sm:w-auto">Sekarang</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA KONSTANTA KALENDER ---
        const SAPTAWARA = ['Redite', 'Soma', 'Anggara', 'Buda', 'Wraspati', 'Sukra', 'Saniscara'];
        const PANCAWARA = ['Umanis', 'Paing', 'Pon', 'Wage', 'Kliwon'];
        const TRIWARA = ['Pasah', 'Beteng', 'Kajeng'];
        const WUKU = [
            'Sinta', 'Landep', 'Ukir', 'Kurantil', 'Talu', 'Bantang', 'Wariga', 'Warigadean', 
            'Julungwangi', 'Sungsang', 'Dungulan', 'Kuningan', 'Langkir', 'Medangsia', 'Pujut', 
            'Pahang', 'Krulut', 'Merakih', 'Tambir', 'Medangkungan', 'Matal', 'Uye', 'Menail', 
            'Prangbakat', 'Bala', 'Ugu', 'Wayang', 'Klawu', 'Dukut', 'Watugunung'
        ];
        const SASIH = [
            'Kasa', 'Karo', 'Katiga', 'Kapat', 'Kalima', 'Kanem', 
            'Kapitu', 'Kawalu', 'Kasanga', 'Kedasa', 'Jyestha', 'Sadha'
        ];

        // --- MESIN PENGGERAK DINAMIS (ASTRONOMICAL ENGINE) ---
        class KaTikaEngine {
            constructor() {
                // Konfigurasi offset (kalibrasi jatuh tempo hari pada saat anchor 1938)
                this.offsetSapta = 1; 
                this.offsetPanca = 0; 
                this.offsetTri = 0;   
                this.offsetWuku = 0;  
            }

            safeIdx(val, max) {
                return ((val % max) + max) % max;
            }

            calculate(targetDate = null) {
                // Ekstraksi waktu murni (Kebal terhadap Timezone perangkat pengguna / Strict WITA)
                let year, month, date, hours, mins;

                if (targetDate) {
                    // Jika mode pencarian, ambil angka murni dari string "YYYY-MM-DDTHH:mm"
                    const parts = targetDate.split('T');
                    const dSplit = parts[0].split('-');
                    const tSplit = parts[1].split(':');
                    
                    year = parseInt(dSplit[0], 10);
                    month = parseInt(dSplit[1], 10) - 1; // JS month 0-11
                    date = parseInt(dSplit[2], 10);
                    hours = parseInt(tSplit[0], 10);
                    mins = parseInt(tSplit[1], 10);
                } else {
                    // Jika real-time, format waktu ke standar WITA (Makassar)
                    const formatter = new Intl.DateTimeFormat('en-US', {
                        timeZone: 'Asia/Makassar',
                        year: 'numeric', month: 'numeric', day: 'numeric',
                        hour: 'numeric', minute: 'numeric', hour12: false
                    });
                    const p = {};
                    for (const part of formatter.formatToParts(new Date())) p[part.type] = part.value;
                    
                    year = parseInt(p.year, 10);
                    month = parseInt(p.month, 10) - 1;
                    date = parseInt(p.day, 10);
                    hours = parseInt(p.hour, 10);
                    if (hours === 24) hours = 0;
                    mins = parseInt(p.minute, 10);
                }

                // 2. TENTUKAN TOTAL HARI SEJAK ANCHOR (27 JUNI 1938)
                const anchorMidnight = Date.UTC(1938, 5, 27);
                const currentMidnight = Date.UTC(year, month, date);
                const daysDiff = Math.floor((currentMidnight - anchorMidnight) / 86400000);
                
                // 3. HITUNG EVENT TETAP & JENDELA EVENT 1 JAM
                // Menggunakan batas event: 05:30 (Sunrise/Galang Kangin) dan 18:00 (Sunset/Sandikala) WITA
                const timeFloat = hours + (mins / 60);
                
                let absoluteEventIndex = 0;
                let isEventActive = false;
                let activeEventLabel = "";
                
                // Deteksi Jendela Event 1 Jam (Kompensasi pergeseran alam)
                if (timeFloat >= 18 && timeFloat < 19) {
                    isEventActive = true;
                    activeEventLabel = "🌅 EVENT SANDIKALA";
                } else if (timeFloat >= 5.5 && timeFloat < 6.5) {
                    isEventActive = true;
                    activeEventLabel = "🌄 EVENT GALANG KANGIN";
                }
                
                // Logika Penentuan Event Timeline (0 = Event Sunset 27 Jun 1938)
                if (timeFloat < 5.5) {
                    absoluteEventIndex = (daysDiff * 2) - 2; // Berada di rentang setelah sunset kemarin
                } else if (timeFloat >= 5.5 && timeFloat < 18) {
                    absoluteEventIndex = (daysDiff * 2) - 1; // Berada di rentang setelah sunrise hari ini
                } else {
                    absoluteEventIndex = (daysDiff * 2);     // Berada di rentang setelah sunset hari ini
                }
                
                // 4. MESIN DINA (1 Dina = 3 Event Fase) - Berjalan di backend
                const totalDina = Math.floor(absoluteEventIndex / 3);

                // Penentuan status fase di luar jendela event 1 jam
                let currentPhase = "";
                if (timeFloat >= 19 || timeFloat < 5.5) {
                    currentPhase = "🌙 FASE PETENG"; // Malam hari
                } else if (timeFloat >= 6.5 && timeFloat < 18) {
                    currentPhase = "☀️ FASE LEMAH"; // Siang hari
                }

                // Final display: Tampilkan event jika aktif, jika tidak tampilkan fase saat ini
                const finalEventDisplay = isEventActive ? activeEventLabel : currentPhase;

                // 5. MODUL SASIH DENGAN POLA GELAP TERANG
                const sasihIndex = this.safeIdx(Math.floor(totalDina / 30), 12);
                const dinaDalamSasih = this.safeIdx(totalDina, 30); // Nilai 0 - 29 (Dina 1 s/d 30)
                const isPolaGelap = sasihIndex % 2 === 0;
                
                let lunarPhaseStr = "";
                const dinaKe = dinaDalamSasih + 1; // 1 s/d 30
                
                // Sesuai instruksi, pada dashboard hanya menampilkan Tilem/Purnama, fase "menuju" bisa kita tampilkan jika harinya tepat
                if (isPolaGelap) {
                    if (dinaKe === 1 || dinaKe === 20) lunarPhaseStr = "Tilem 🌑";
                    else if (dinaKe === 10 || dinaKe === 30) lunarPhaseStr = "Purnama 🌕";
                } else {
                    if (dinaKe === 1 || dinaKe === 20) lunarPhaseStr = "Purnama 🌕";
                    else if (dinaKe === 10 || dinaKe === 30) lunarPhaseStr = "Tilem 🌑";
                }

                // Format String Masehi Manual (Menghindari manipulasi Timezone browser)
                const pad = (n) => n.toString().padStart(2, '0');
                const daysNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
                const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
                const dayOfWeek = new Date(Date.UTC(year, month, date)).getUTCDay();
                const gregorianDisplay = `${daysNames[dayOfWeek]}, ${date} ${monthNames[month]} ${year}`;
                const timeDisplay = `${pad(hours)}:${pad(mins)}`;

                return {
                    eventStatus: finalEventDisplay,
                    isEventActive: isEventActive,
                    saptawara: SAPTAWARA[this.safeIdx(totalDina + this.offsetSapta, 7)],
                    pancawara: PANCAWARA[this.safeIdx(totalDina + this.offsetPanca, 5)],
                    triwara: TRIWARA[this.safeIdx(totalDina + this.offsetTri, 3)],
                    wuku: WUKU[this.safeIdx(Math.floor((totalDina + this.offsetWuku) / 7), 30)],
                    sasihName: SASIH[sasihIndex],
                    dinaLabel: `Dina Ke-${dinaKe} Sasih ${SASIH[sasihIndex]}`, // Backend use
                    lunarPhase: lunarPhaseStr,
                    gregorian: (targetDate ? "[MODE PENCARIAN] " : "") + gregorianDisplay + " - " + timeDisplay + " WITA"
                };
            }

            updateUI(targetDate = null) {
                const data = this.calculate(targetDate);
                
                const eventStatusEl = document.getElementById('event-status');
                eventStatusEl.innerText = data.eventStatus; // Pasang teks status event
                
                // Ubah gaya visual (warna & animasi) jika event 1 jam sedang berlangsung
                if (data.isEventActive) {
                    eventStatusEl.classList.remove('bg-gold-dark', 'border-gold', 'text-gold');
                    eventStatusEl.classList.add('bg-red-900', 'bg-opacity-80', 'border-red-500', 'text-white', 'animate-pulse');
                } else {
                    eventStatusEl.classList.remove('bg-red-900', 'bg-opacity-80', 'border-red-500', 'text-white', 'animate-pulse');
                    eventStatusEl.classList.add('bg-gold-dark', 'border-gold', 'text-gold');
                }
                
                document.getElementById('saptawara').innerText = data.saptawara;
                document.getElementById('tri-panca').innerHTML = `${data.triwara} <span class="text-white opacity-50 px-2">&bull;</span> ${data.pancawara}`;
                document.getElementById('wuku').innerText = data.wuku;
                document.getElementById('sasih').innerText = data.sasihName;
                document.getElementById('dina-label').innerText = data.dinaLabel;
                document.getElementById('gregorian-date').innerText = data.gregorian;

                // Modul Lunar Phase: Hanya tampilkan jika jatuh pada Purnama / Tilem (sesuai intruksi)
                const lunarPhaseEl = document.getElementById('lunar-phase');
                if (data.lunarPhase !== "") {
                    lunarPhaseEl.innerText = data.lunarPhase;
                    lunarPhaseEl.classList.remove('hidden');
                } else {
                    lunarPhaseEl.classList.add('hidden');
                }
            }
        }

        // Inisialisasi Aplikasi
        document.addEventListener('DOMContentLoaded', () => {
            const kalender = new KaTikaEngine();
            
            // State untuk mode pencarian
            let isSearchMode = false;
            let searchDateValue = null;

            // Fungsi render utama
            const renderApp = () => {
                kalender.updateUI(isSearchMode ? searchDateValue : null);
            };

            // Render pertama kali
            renderApp();

            // Event Listener Tombol Cari
            document.getElementById('btn-search').addEventListener('click', () => {
                const inputVal = document.getElementById('search-input').value;
                if (inputVal) {
                    isSearchMode = true;
                    // Kirim STRING mentah ke engine, hindari penggunaan 'new Date()'
                    searchDateValue = inputVal; 
                    renderApp();
                }
            });

            // Event Listener Tombol Sekarang (Reset)
            document.getElementById('btn-reset').addEventListener('click', () => {
                isSearchMode = false;
                searchDateValue = null;
                document.getElementById('search-input').value = '';
                renderApp();
            });

            // Update setiap 1 menit (Hanya berjalan jika TIDAK dalam mode pencarian)
            setInterval(() => {
                if (!isSearchMode) {
                    renderApp();
                }
            }, 60000);
        });
    </script>
</body>
</html>

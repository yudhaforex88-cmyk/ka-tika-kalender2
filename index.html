<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ka-Tika | Kalender Bali Klasik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Balinese&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f0a07;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(212,175,55,0.12) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(191,123,44,0.14) 0%, transparent 40%),
                linear-gradient(145deg, #1a120d 0%, #100b07 45%, #080605 100%);
            color: #f2e6d5;
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .font-balinese { font-family: 'Noto Sans Balinese', serif; }
        .text-gold { color: #e2bc65; }
        .border-gold { border-color: #d4af37; }
        .bg-gold-dark { background-color: rgba(212, 175, 55, 0.12); }

        .card-elegant {
            background: linear-gradient(155deg, rgba(40,27,18,0.95), rgba(22,14,9,0.96));
            box-shadow: 0 28px 55px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(226,188,101,0.24);
            border: 1px solid rgba(226, 188, 101, 0.35);
            backdrop-filter: blur(4px);
        }

        .corner-ornament {
            position: absolute;
            width: 48px;
            height: 48px;
            border-color: rgba(226,188,101,0.45);
        }
        .corner-tl { top: 14px; left: 14px; border-top: 2px solid; border-left: 2px solid; }
        .corner-tr { top: 14px; right: 14px; border-top: 2px solid; border-right: 2px solid; }
        .corner-bl { bottom: 14px; left: 14px; border-bottom: 2px solid; border-left: 2px solid; }
        .corner-br { bottom: 14px; right: 14px; border-bottom: 2px solid; border-right: 2px solid; }

        .ornament-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(226,188,101,0.95), transparent);
        }

        .aksara-badge {
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px rgba(226,188,101,0.35);
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-md mx-auto w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <p class="font-balinese text-gold text-lg aksara-badge mb-1">ᬓᬢᬶᬓ ᬓᬮᬾᬦ᭄ᬤᬾᬃ</p>
            <h1 class="text-4xl md:text-5xl font-cinzel text-gold font-bold tracking-widest mb-2">KA-TIKA</h1>
            <div class="ornament-line w-3/4 mx-auto mb-2"></div>
            <p class="text-sm italic text-amber-100/70">Kalender Siklus Wariga Bali</p>
        </div>

        <!-- Main Dashboard Card -->
        <div class="card-elegant rounded-3xl p-8 relative overflow-hidden text-center transition-all duration-500">
            <div class="corner-ornament corner-tl"></div>
            <div class="corner-ornament corner-tr"></div>
            <div class="corner-ornament corner-bl"></div>
            <div class="corner-ornament corner-br"></div>
            <!-- Background Mandala/Pattern Hint -->
            <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: repeating-radial-gradient(circle at center, rgba(226,188,101,0.6), rgba(226,188,101,0.6) 1px, transparent 1px, transparent 11px);"></div>

            <!-- Event Status Container -->
            <div class="mb-6 inline-block px-4 py-1.5 rounded-full border border-gold bg-gold-dark text-gold text-xs font-bold tracking-widest uppercase shadow-inner transition-colors duration-300" id="event-status">
                Menghitung Fase Astronomi...
            </div>

            <!-- Hero Widget: Saptawara -->
            <div class="mb-4">
                <h2 class="text-5xl sm:text-6xl font-cinzel text-white font-bold tracking-wider uppercase drop-shadow-md" id="saptawara">
                    --
                </h2>
            </div>

            <!-- Sub Hero: Triwara & Pancawara -->
            <div class="mb-8">
                <p class="text-xl sm:text-2xl text-gold font-semibold tracking-wide" id="tri-panca">
                    -- &bull; --
                </p>
            </div>

            <div class="ornament-line w-full mb-6 opacity-50"></div>

            <!-- Bottom Data: Wuku & Sasih -->
            <div class="grid grid-cols-2 gap-4 text-center mb-4">
                <div class="flex flex-col">
                    <span class="text-xs text-amber-200/70 uppercase tracking-widest mb-1">Wuku</span>
                    <span class="text-lg text-white font-medium" id="wuku">--</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-xs text-amber-200/70 uppercase tracking-widest mb-1">Sasih</span>
                    <span class="text-lg text-white font-medium" id="sasih">--</span>
                </div>
            </div>

            <!-- Lunar Phase & Dina Label -->
            <div class="mt-4">
                <p class="text-sm text-gold tracking-wide" id="lunar-phase">--</p>
                <p class="text-xs text-gray-400 italic mt-1 hidden" id="dina-label">--</p>
            </div>
        </div>

        <!-- Gregorian Reference -->
        <div class="text-center mt-6 text-sm text-gray-400 tracking-wide font-sans" id="gregorian-date">
            --
        </div>

        <!-- Modul Pencarian Masehi -->
        <div class="mt-8 border-t border-gold/30 pt-6">
            <p class="text-xs text-gold uppercase tracking-widest mb-3 text-center">Pangicen Waktu Masehi</p>
            <div class="flex flex-col sm:flex-row gap-3 justify-center items-center">
                <input type="datetime-local" id="search-input" class="bg-[#1a140f] border border-gold/50 text-[#eaddcf] px-4 py-2 rounded-md outline-none focus:border-gold w-full sm:w-auto text-sm font-sans color-scheme-dark" style="color-scheme: dark;">
                <div class="flex gap-2 w-full sm:w-auto">
                    <button id="btn-search" class="bg-gold-dark border border-gold text-gold px-4 py-2 rounded-md hover:bg-[#d4af37] hover:text-black transition-all text-sm font-bold tracking-wide w-full sm:w-auto">Cari</button>
                    <button id="btn-reset" class="bg-transparent border border-gray-600 text-gray-400 px-4 py-2 rounded-md hover:border-gray-400 hover:text-white transition-all text-sm w-full sm:w-auto">Sekarang</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./src/ka-tika-browser.js"></script>
    <script>
        const toWitaInputString = (dateObj) => {
            const formatter = new Intl.DateTimeFormat('sv-SE', {
                timeZone: 'Asia/Makassar',
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', hour12: false
            });
            return formatter.format(dateObj).replace(' ', 'T');
        };

        const gregorianWitaLabel = (inputVal) => {
            const [datePart, timePart] = inputVal.split('T');
            const [y, m, d] = datePart.split('-').map(Number);
            const dayNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            const dow = new Date(Date.UTC(y, m - 1, d)).getUTCDay();
            return `${dayNames[dow]}, ${d} ${monthNames[m - 1]} ${y} - ${timePart} WITA`;
        };

        document.addEventListener('DOMContentLoaded', () => {
            const machine = new window.KaTikaStateMachine();
            const inputEl = document.getElementById('search-input');
            const eventStatusEl = document.getElementById('event-status');
            let searchMode = false;
            let searchValue = '';

            const render = () => {
                const activeValue = searchMode ? searchValue : toWitaInputString(new Date());
                const result = machine.resolve(activeValue);

                eventStatusEl.innerText = result.metadata.dina.pola_aktif;
                document.getElementById('saptawara').innerText = result.ui_display.nama_saptawara;
                document.getElementById('tri-panca').innerHTML = `${result.ui_display.nama_triwara} <span class="text-white opacity-50 px-2">&bull;</span> ${result.ui_display.nama_pancawara}`;
                document.getElementById('wuku').innerText = result.ui_display.nama_wuku;
                document.getElementById('sasih').innerText = result.ui_display.nama_sasih;

                document.getElementById('lunar-phase').innerText = `Dina ${result.metadata.sasih_state.step}`;
                document.getElementById('gregorian-date').innerText = (searchMode ? '[MODE PENCARIAN] ' : '') + gregorianWitaLabel(activeValue);
            };

            render();

            document.getElementById('btn-search').addEventListener('click', () => {
                if (!inputEl.value) return;
                searchMode = true;
                searchValue = inputEl.value;
                render();
            });

            document.getElementById('btn-reset').addEventListener('click', () => {
                searchMode = false;
                searchValue = '';
                inputEl.value = '';
                render();
            });

            setInterval(() => {
                if (!searchMode) render();
            }, 60000);
        });
    </script>
</body>
</html>
